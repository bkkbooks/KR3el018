body:
  text: 上卷正體主治大法一脅肋脹痛若大便通和喘咳吐痰者肝火侮肺也用小柴胡湯加青皮山梔清之若胸腹脹痛大便不通喘咳吐血者瘀血停滯也用當歸導滯散通之內經云肝藏血脾統血蓋肝屬木生火侮土肝火既熾肝血必傷脾氣必虛宜先清肝養血則瘀血不致凝滯肌肉不致遍潰次壯脾健胃則瘀血易潰新肉易生若行克伐則虛者益虛滯者益滯禍不旋踵矣一肚腹作痛或大便不通按之痛甚此瘀血在內也用加味承氣湯下之既下而痛不止按之仍痛瘀血未盡也用加味四物湯補而行之若腹痛按之不痛血氣傷也用四物湯加參耆白朮補而和之若下而胸脅反痛肝血傷也用四君芎歸補之既下而發熱陰血傷也用四物參術補之既下而惡寒陽氣傷也用十全大補湯補之既下而惡寒發熱氣血俱傷也用八珍湯補之既下而欲嘔胃氣傷也用六君當歸補之既下而泄瀉脾腎傷也用六君肉果破故紙補之若下後手足俱冷昏憒出汗陽氣虛寒也急用參附湯吐瀉手足俱冷指甲青者脾腎虛寒之甚也急用大劑參附湯口噤手撒遺尿痰盛唇青體冷者虛極之壞症也急投大劑參附湯多有得生者一肌肉間作痛營衛之氣滯也用復元通氣散筋骨作痛肝腎之氣傷也用六味地黃丸內傷下血作痛脾胃之氣虛也用補中益氣湯外傷出血作痛脾肺之氣虛也用八珍湯大凡下血不止脾胃之氣脫也吐瀉不食脾胃之氣敗也苟預為調補脾胃則無此患矣一作痛若痛至四五日不減或至一二日方痛欲作膿也用托裡散若以指按下復起膿已成也刺去其膿痛自止若頭痛時作時止氣血虛也痛而兼眩屬痰也當生肝血補脾氣一青腫不潰用補中益氣湯以補氣腫黯不消用加味逍遙散以散血若焮腫脹痛瘀血作膿也以八珍湯加白芷托之若膿潰而反痛氣血虛也以十全大補湯補之若骨骨界接而復脫肝腎虛也用地黃丸腫不消青不退氣血虛也內用八珍湯外用蔥尉法則瘀血自散腫痛自消若行血破血則脾胃愈虛運氣愈滯若敷貼涼藥則瘀血益凝內腐益深致難收拾一發熱若出血過多或膿潰之後脈洪大而虛重按全無此陰虛發熱也用當歸補血湯脈沉微按之軟弱此陰盛發躁也用四君薑附若發熱煩躁肉瞤筋惕亡血也用聖愈湯如汗不止血脫也用獨參湯其血脫脈實汗後脈躁者難治細小者易治外臺祕要云陰盛發躁欲坐井中用附子四逆湯加蔥白王太僕先生云凡熱來復去晝見夜伏夜見晝伏不時而動者名曰無火此無根之虛火也一作嘔若因痛甚或因克伐而傷胃者用四君當歸半夏生薑或因忿怒而肝傷者用小柴胡湯加山梔茯苓若因痰火盛用二陳姜炒黃連山梔若因胃氣虛用補中益氣湯生薑半夏若出血過多或因潰後用六君子湯加當歸一喘咳若出血過多面黑胸脹或胸膈痛而發喘者乃氣虛血乘於肺也急用二味參蘇飲若咳血衄血者乃氣逆血蘊於肺也急用十味參蘇飲加山梔芩連蘇木一作渴若因出血過多用四物參朮湯不應用人參黃耆以補氣當歸熟地以養血若因潰後用八珍湯若因胃熱傷津液用竹葉黃耆湯胃虛津液不足用補中益氣湯胃火熾盛用竹葉石膏湯若煩熱作渴小便淋澀乃腎經虛熱非地黃丸不能救一出血若患處或諸竅出者肝火熾盛血熱錯經而妄行也用加味逍遙散清熱養血若中氣虛弱血無所附而妄行用加味四君子湯補益中氣或元氣內脫不能攝血用獨參湯加炮姜以回陽如不應急加附子或血蘊於內而嘔血用四物加柴胡黃芩凡傷損勞碌怒氣肚腹脹悶誤服大黃等藥傷經絡則為吐血衄血便血尿血傷陰絡則為血積血塊肌肉青黯此臟腑虧損經隧失職急補脾肺亦有生者但患者不悟此理不用此法惜哉一手足損傷若元氣虛弱或不戒房勞或妄行攻伐致死肉上延或腐而不痛黑而不脫者當大補元氣庶可保生若手足節骨界斷去者無妨骨斷筋連不急剪去若侵及好肉則不治若預為調補脾氣則無此患大凡膿瘀肉焮者即針之而投托里散或口噤遺尿而似破傷風者急用十全大補湯加附子多有生者一腐肉不潰或惡寒而不潰用補中益氣湯發熱而不潰用八珍湯若因克伐而不潰者用六君子湯加當歸其外皮黑堅硬不潰者內火蒸炙也內服八珍湯外塗當歸膏其死肉不能潰或新肉不能生而致死者皆失於不預補脾胃也一新肉不生若患處夭白脾氣虛也用六君芎歸患處緋紅陰血虛也用四物參術若惡寒發熱氣血虛也用十全大補湯膿稀白而不生者脾肺氣虛也用補中益氣湯膿稀赤而不生者心脾血虛也用東垣聖愈湯寒熱而不生者肝火動也用加味逍遙散晡熱而不生肝血虛也用八珍牡丹皮食少體倦而不生脾胃氣虛也用六君子湯膿穢而不生者元氣內傷也用補中益氣湯如夏月用調中益氣湯作瀉用清暑益氣湯秋令作瀉用清燥湯一重傷昏憒者急灌以獨參湯雖內瘀血切不可下急用花蕊石散內化之恐因瀉而亡陰也若元氣虛甚者尤不可下亦用以前散化之凡瘀血在內大小便不通用大黃朴硝血凝而不下者急用木香肉桂末二三錢以熟酒調灌服血下乃生如怯弱之人用硝黃須加肉桂木香同煎假其熱以行其寒也一大便祕結若大腸血虛火熾者用四物湯送潤腸丸或以豬膽汁導之若腎虛火燥者用六味地黃丸腸胃氣虛用補中益氣湯一傷損症用黑羊皮者蓋羊性熱能補氣也若杖瘡傷甚內肉已壞欲其潰者貼之成膿固速苟內非補劑壯其根本毒氣不無內侵外非砭刺泄其瘀穢良肉不無傷壞者受刑輕外皮破傷者但宜當歸膏敷貼更服四物芩連柴胡山梔白朮茯苓又疔痂不結傷肉不潰死血自散腫痛自消若概行罨貼則醞釀瘀毒矣一跳躍捶胸閃挫舉重勞役恚怒而胸腹痛悶喜手摸者肝火傷脾也用四君柴胡山梔畏手摸者肝經血滯也用四物柴胡山梔桃仁紅花若胸脅作痛飲食少思肝脾氣傷也用四君芎歸若胸腹不利食少無寐脾氣鬱結也用加味歸脾湯若痰氣不利脾肺氣滯也用二陳白朮芎歸梔子青皮若咬牙發搐肝旺脾虛也用小柴胡湯川芎山梔天麻鉤藤鉤或用風藥則肝血益傷肝火益甚或飲糖酒則腎水益虛肝火愈熾若用大黃等藥內傷陰絡反致下血少壯者必為痼疾老弱者多致不起以上若胸脅作痛發熱晡熱肝經血傷也用加味逍遙散一破傷風河間云風症善行數變入臟甚速死生在反掌之間宜急分表裡虛實而治之邪在表者則筋脈拘急時或寒熱筋惕搐搦脈浮弦用羌活防風湯散之在半表半裡者則頭微汗身無汗用羌活湯和之傳入里者舌強口噤項背反張筋惕搐搦痰涎壅盛胸腹滿悶便溺閉赤時或汗出脈洪數而弦以大芎黃湯導之既下而汗仍出表虛也以白朮防風湯補之不時灌以粥飲為善前云乃氣虛未損之法也若膿血太泄陽隨陰散氣血俱虛而類前症者悉宜大補脾胃切忌祛風之藥一發痙仲景云諸痙項強皆屬於溫又云太陽病發汗太多致痙風病下之則痙復發汗則拘急瘡家發汗則痙是汗下重亡津液所致有汗而不惡寒曰柔痙以風能散氣也宜白朮湯加桂心黃耆無汗而惡寒曰剛痙以寒能澀血也宜葛根湯皆氣血內傷筋無所營而變非風也杖瘡及勞傷氣血而變者當補氣血未應用獨參湯手足冷加桂附緩則不救撲傷之症治驗血脫煩躁有一患者兩脅脹悶欲咳不咳口覺血腥遍身臀腿脹痛倦怠不食煩渴脈大此血脫煩躁也與童便酒及砭患處出死血糜肉甚多忽發熱煩躁汗出投以獨參湯三劑少止又用補氣血清肝火之藥數劑飲食稍進後用獨參湯間服諸症悉退飲食頓加但不能多寐以歸脾湯加山梔竹茹四劑而熟睡因勞心遂煩渴自汗脈大無力以當歸補血湯二劑而安又以十全大補去川芎加麥門五味牡丹地骨麻黃根炒浮麥數劑而汗止死肉且潰又二十餘劑而新肉生血虛發躁有一患者煩躁面赤口乾作渴脈洪大按之如無余曰此血虛發躁也遂以當歸補血湯二劑即止後日晡發熱更以四物加柴胡牡丹地骨黃柏知母治之熱退而瘡斂東垣云發熱惡寒大渴不止其脈大而無力者非白虎湯症此血虛發躁也宜用當歸補血湯治之裴先生云肌熱躁熱目赤面紅其脈洪大而虛此血虛也若誤用白虎湯輕則危重則斃氣虛血熱有一患者頭額出汗熱渴氣短煩躁骨痛瘀肉不潰遂割去之出鮮血服芩連之藥益甚其脈洪大而微此氣血俱虛邪火熾盛所致以四物加參耆朮炙草少用柴胡炒芩二劑頭汗頓止又加麥門五味肉桂二劑諸症悉退後用參耆歸朮炒芍熟地麥門五味十餘劑瘀血潰而膿水稠矣但新肉不生以前藥倍用白朮而斂瘀血泛注有一患者瘀血流注腰膂兩足俱黑隨飲童便酒砭出瘀血糜肉投以小柴胡湯去半夏加山梔芩連骨碎補以清肝火用八珍茯苓以壯脾胃死肉潰而新肉生後瘡復潰得靜調治年餘而痊有一患者瘀血攻注陰囊潰而成漏膿水清稀所服皆寒涼之劑診其肝脈短澀餘脈浮而無力此肝木受肺金剋制又元氣虛不能收斂遂用壯脾胃生氣血之方元氣少復後終歿於金旺之日瘀血作痛有一患者腫痛發熱作渴汗出余曰此陰血受傷也先砭去惡穢以通壅塞後用四物柴胡黃芩山梔丹皮骨碎補以清肝火而愈有一患者傷處揉散惟腫痛不消余曰此瘀血在內宜急砭之不從余以蘿蔔自然汁調山梔末敷之破處以當歸膏貼之更服活血之劑而瘥數年之後但遇天陰仍作癢痛始知不砭之失有一患者臀腿黑腫而反不破但脹痛重墜皆以為內無瘀血惟敷涼藥可以止痛余診其尺脈澀而結此因體肥肉厚瘀血蓄深刺去即愈否則內潰有爛筋傷骨之患余入針四寸漂黑血數升腫痛遂止是日發熱惡寒煩渴頭痛此氣血俱虛而然也以十全大補之劑遂瘥肝火作痛有一患者瘀血內脹焮痛發熱口乾作渴飲食不甘四肢倦怠余曰此肝火熾盛脾土受制故患前症喜其稟實年壯第用降火清肝活血之劑而愈肝火忿怒有一患者患處脹痛悲哀忿怒此厥陽之火為七情激之而然耳遂砭去瘀血以小柴胡湯加山梔黃連桔梗而安後用生肝血養脾氣之藥瘡潰而斂肝火脅脹有一患者患處脹痛發熱欲嘔兩脅熱脹肝脈洪大余曰肝火之症也但令飲童便並小柴胡湯加黃連山梔歸梢紅花諸症果退此症若左關脈浮而無力以手按其腹反不脹者此血虛而肝脹也當以四物參苓青皮甘草之類治之若左關脈洪而有力胸脅脹痛者按之亦痛此怒氣傷肝之症也以小柴胡芎歸青皮芍藥桔梗枳殼主之蓋此症不必論其受責之輕重問其患處去血之曾否但被人扭按甚重努力恚怒以傷其氣血瘀血歸肝多致前症甚則胸脅脹滿氣逆不通或血溢口鼻卒至不救肝膽虛症有一患者愈後口苦腰脅脹痛服補腎行氣等藥不愈余按其肝脈浮而無力此屬肝膽氣血虛而然耳用參耆歸身地黃白朮麥門五味治之而愈血虛腹痛有一患者杖後服四物紅花桃仁大黃等劑以逐瘀血腹反痛更服一劑痛益甚按其腹不痛余曰此血虛也故喜按而不痛宜溫補之劑遂以歸身白朮參耆炙草二劑痛即止氣虛不潰有一患者瘀血已去飲食少思死肉不潰用托裡之藥膿稍潰而清此血氣虛也非大補不可彼不從余強用大補之劑飲食進而死肉潰但少寐以歸脾湯加山梔二劑而寐因勞心煩躁作渴脈浮洪大以當歸補血湯二劑而安寒凝不潰有一患者受刑太重外皮傷破瘀血如注內肉糜爛黯腫上胤胸背下至足指昏憒不食隨以黑羊皮熱貼患處灌以童便酒薄粥更以清肝活血調氣健脾之劑神思稍蘇始言遍身強痛又用大劑養血補氣之藥腫消食進時仲冬瘀血凝結不能潰膿又用大補之劑壯其陽氣其膿方熟遂砭去洞見其骨塗以當歸膏及服前藥百餘劑肌肉漸生脾虛不斂有一患者潰而不斂以內有熱毒欲用寒涼之藥余曰此血氣俱虛而不能斂耳非歸茯參耆之類培養脾土則肌肉何由而生豈可復用寒涼克伐之藥重損氣血哉遂用前藥治之而愈血虛筋攣有一患者腹脹嘔吐眩暈用柴胡黃芩山梔紫蘇杏仁枳殼桔梗川芎當歸赤芍紅花桃仁四劑而定後又出血過多昏憒目黑用十全大補等藥而蘇時肌肉潰爛膿水淋漓筋攣骨痛餘切其脈浮而澀沉而弱此因氣血耗損不能養筋筋虛不能束骨遂用養氣血之藥治之而愈腎虛氣逆有一患者杖瘡愈後失於調理頭目不清服祛風化痰等藥反眩暈服牛黃清心丸又肚腹疼痛杖痕腫癢發熱作渴飲食不思痰氣上升以為杖瘡餘毒復作診左尺脈洪大按之如無余曰此腎經不足不能攝氣歸源遂用人參黃耆茯苓陳皮當歸川芎熟地山藥山茱萸五味麥門炙草服之而尋愈後因勞熱渴頭痛倦怠少食用補中益氣湯加麥門五味而痊濕熱乘肝有一患者愈後腿作痛余意膿血過多瘡雖愈肝經血氣尚未充實而濕熱乘虛也遂以八珍加牛膝木瓜蒼朮黃柏防己炙草以祛濕熱養陰血痛漸止乃去防己黃柏服之遂瘳肝經鬱火有一患者瘀血失砭脹痛煩渴縱飲涼童便渴脹頓止以蘿蔔細搗塗之瘀血漸散已而患處作癢仍塗之癢止後口乾作渴小腹引陰莖作痛小便如淋時出白津此肝經鬱火也遂以小柴胡湯加大黃黃連山梔飲之諸症悉退再用養血等藥而安夫小腹引陰莖作痛等症往往誤認為寒症投以熱劑則諸竅出血或二便不通以及危殆輕亦損其目矣痛傷胃嘔有一患者痛甚發熱嘔吐少食胸膈痞滿用行氣破血之劑益甚口乾作渴大便不調患處色黯余曰此痛傷胃氣所致遂以四君當歸炒芩軟柴藿香二劑諸症漸愈又用大補之劑潰之而瘳藥傷胃嘔有一患者發熱焮痛服寒涼藥更加口乾作渴肚腹亦痛自以為瘀血欲下之余按其肚腹不痛脈細微而遲飲食惡寒此涼藥傷胃而然也急用六君加芍藥當歸炮附子各一錢服之前症益甚反加譫語面赤余意其藥力未至耳前藥再加附子五分服之即睡覺來諸病頓退而安氣血不損有一患者瘀血雖去飲食形氣如故但熱渴焮痛膈痞有痰以小柴胡湯加天花粉貝母桔梗山梔二劑少愈又加生地歸尾黃芩柴胡山梔花粉而愈余治百餘人其杖後血氣不虛者惟此一人耳治者審之行氣之非有一患者服行氣之劑胸痞氣促食少體倦色黯膿清此形氣俱虛之症也先用六君桔梗二劑胸膈氣和後用補中益氣去升麻加茯苓半夏五味麥門治之元氣漸復而愈若用前劑戕賊元氣多致不救下血之非有一患者去其患處瘀血用四物柴胡紅花治之焮痛頓止但寒熱口乾飲食少思用四物白朮茯苓柴胡黃芩花粉四劑寒熱即退用六君芎歸藿香而飲食進腐肉雖潰膿水清稀以前藥倍用參耆歸朮茯苓二十餘劑腐肉俱潰膿水漸稠誤服下藥一鍾連瀉四次患處色黯喜其脈不洪數乃以十全大補倍加肉桂麥門五味數劑肉色紅活新肉漸生喜在壯年易於調理又月餘而愈否則不救凡杖瘡跌撲之症患處如有瘀血止宜砭去服壯元氣之劑蓋其氣已損切不可再用行氣下血之藥復損脾胃則運氣愈難行達於下而反為敗症怯弱者多致夭枉寒藥之非有一患者腫痛敷寒涼之藥欲內消瘀血反致臀腿俱冷瘀血並胸腹痞悶余急去所敷之藥以熱童便酒洗患處服六君木香當歸敷回陽膏臀腿漸溫又以前藥去木香加川芎藿香肉桂四劑瘀血解乃刺之更以壯脾胃養氣血得痊蓋氣血得溫則行得寒則凝寒極生熱變化為膿腐潰深大血氣既敗肌肉無由而生欲望其生難矣不砭之非有一患者發熱煩躁用四物黃芩紅花軟柴山梔花粉煩熱已清瘀血深蓄欲針出之不從忽牙關緊急患處刺痛始針去膿血即安用托裡養血新肉漸長忽患處瘙癢此風熱也用祛風消毒之劑而痊不補之非有一患者臀腿脹痛發熱煩躁刺去死血脹痛少寬熱躁愈甚此血脫邪火旺而然也急用獨參湯補之少愈又以健脾胃養氣血藥治之腐肉漸潰遂愈大抵此症宜預調補以顧收斂切不可伐其氣血不行補益以至不能收斂矣破傷風表症有一患者仲夏誤傷手腰背反張牙關緊急脈浮而散此表症也遂用羌活防風湯一劑即解此症若在秋冬腠理致密之時須用麻黃之類以發汗此乃暴傷氣血不損之治法也破傷風裡症有一患者杖處略破而患此脈洪大而實此里症也用大芎黃湯一劑大便微行一次悉退若投表藥必死宜急分表裡虛實而治之庶無誤矣膿內焮類破傷風有一患者寒熱口乾用四物參耆白朮軟柴炒芩麥門五味四劑少退余欲砭去瘀血不從後怔忡不寐飲食少思牙關牽緊頭目疼痛惡寒發熱此膿內焮也遂砭去之即安以八珍棗仁麥門五味二十劑前症漸愈又用前藥及獨參湯瘀肉漸潰後因勞又少寐盜汗以歸脾湯麥門五味遠志而痊後牙關脹悶面目焮赤又似破傷風仍以為虛用八珍等藥亦安膿潰類破傷風有一患者腹脹喘促作渴寒熱臀腿糜爛與死肉相和如皮囊盛糊用童便煎四物桃仁紅花柴胡黃芩麥門花粉服之頓退彼用黑羊皮貼之益甚後砭去膿血甚多氣息奄奄唇口微動牙關緊急患處色黯或欲用破傷風藥余曰此氣血虛而變症也用參耆芎歸白朮並獨參湯入乳汁元氣復而諸症愈及用十全大補湯調理而安此症若膿瘀內焮者宜針之若潰後口噤遺尿而類破傷風等症者乃氣血虛極也急用大補之劑若素多痰患風症者宜清痰降火若因怒而見風症者宜清肝降火若人不慎房勞而忽患前症此由腎水不足心火熾甚宜滋陰補氣血為主若誤作風症治之即死內虛變痓痓當作痙有一患者內潰針出膿三五碗遂用大補之劑翌日熱甚汗出足冷口噤腰背反張衆欲投發散之劑余曰此氣血虛極而變痙也若認作風治則誤矣用十全大補等藥而愈此症多因傷寒汗下過度與産婦潰瘍氣血虧損所致但當調補氣血為善若服克伐之劑多致不救有一患者兩月餘矣瘡口未完因怒發痙瘡口出血此怒動肝火而為患耳用柴胡芩連山梔防風桔梗天麻鉤藤鉤甘草治之頓愈劉宗厚先生云痓有屬風火之熱內作者有因七情怒氣而作者亦有濕熱內盛痰涎壅遏經絡而作者惟宜補虛降火敦土平木清痰去濕墜跌金傷治驗瘀血腹痛有一患者仲秋夜歸墜馬腹內作痛飲酒數杯翌早大便自下瘀血即安此元氣充實挾酒勢而行散也一男子跌傷腹痛作渴食梨子二枚益甚大便不通血欲逆上用當歸承氣湯加桃仁瘀血下而瘥此因元氣不足瘀血得寒而聚凝也故産婦金瘡者不宜食此一男子孟秋墜梯腹停瘀血用大黃等藥其血不下反加胸膈脹痛喘促短氣余用肉桂木香末各三錢熱酒調服即下黑血及前所服之藥而蘇此因寒藥凝滯而不行故用辛溫之劑散之脾傷腹痛陳侍御墜馬腿痛作嘔服下藥一劑胸腹脹痛按之即止惟倦怠少氣診其脈微細而澀余曰非瘀血也乃痛傷氣血復因藥損脾氣而然耳投養脾胃生氣血之藥而愈血虛脅脹李進士季夏傷手出血不止發熱作渴兩脅作脹按之即止此血虛也用八珍加軟柴胡天花粉治之頓愈更用養氣血之藥調理而痊血虛煩躁吳給事墜馬傷首出血過多發熱煩躁肉瞤筋惕或欲投破傷風藥余曰此血虛火動所致當峻補其血為善遂用聖愈湯二劑即安又養氣血而瘡痊亡血出汗張進士季秋墜馬亡血過多出汗煩躁翌日其汗自止熱躁益甚口噤手顫此陰血虛陽火乘之而汗出為寒氣收斂腠理故汗不得出火不得泄怫鬱內甚而益增他症也余用四物加柴胡黃芩山梔四劑少止又用四物參耆軟柴胡五味麥門治之而痊亡血昏憒二條一婦人孟冬傷足亡血頭汗內熱作渴短氣煩躁不時昏憒其脈洪大按之微弱此陰血虛於下孤陽炎於上故發厥而頭出汗也以四物合小柴胡湯一劑汗即止以四物去川芎加參耆麥門五味炙草少用肉桂四劑諸症悉去又三十餘劑血氣復而愈一男子孟夏折腿出血過多其初眩暈眼花後則昏憒此陰血傷損陽火熾甚制金不能平木木旺生風所致急灌童便更用人參當歸各五錢荊芥川芎柴胡芍藥白朮各二錢山梔黃芩桔梗各一錢甘草五分服之隨爽又用四物參耆各三錢生地柴胡各一錢四劑煩躁悉去濕痰作痛三條大宗伯沈立齊孟冬閃腰作痛胸間痰氣不利以枳殼青皮柴胡升麻木香茴香當歸川芎赤芍神麯紅花四劑而瘥但飲食不甘微有潮熱以參耆白朮陳皮白芍各一錢歸身二錢川芎八分軟柴胡地骨炙草各五分十餘劑而康劉尚寶體肥臀閃作痛服透骨丹反致肢節俱痛下體益甚以二陳南星羌活防風牛膝木瓜蒼朮黃芩黃柏治之身痛遂安以前藥加歸尾赤芍桔梗治之而痊鄭吏部素有濕痰孟冬墜馬服辛熱破血之藥遍身作痛發熱口乾脈大而滑此熱劑激動痰火為患耳治以清燥湯去人參當歸黃耆加黃芩山梔半夏黃柏熱痛頓去患處少愈用二陳羌活桔梗蒼朮黃柏薑製生地當歸遂痊肝火作痛楊司天骨已入𩨽一作臼患處仍痛服藥不應肝脈洪大而急余曰此肝火盛而作痛也用小柴胡湯加山梔黃連二劑痛止用四物山梔黃柏知母調理而康血虛作痛一婦人磕臂出血骨痛熱渴煩悶頭暈日晡益甚此陰虛內熱之症用八珍加丹皮麥門五味骨碎補肉桂及地黃丸治之悉愈卻去桂加牛膝續斷二十餘劑而瘡愈骨傷作痛二條一小兒足傷作痛肉色不變傷在骨也頻用炒蔥尉之五更用和血定痛丸日間用健脾胃生氣血之劑數日後服地黃丸三月餘而痊一小兒臂骨出𩨽接入腫痛發熱服流氣等藥益甚飲食少思余以蔥尉之其痛即止以六君黃耆柴胡桔梗續斷骨碎補治之飲食進而腫痛消又用補中益氣加麥門五味治之氣血和而熱退愈矣氣虛血滯戴給事墜馬腿腫痛而色黯食少倦怠此元氣虛弱不能運散瘀血而然耳遂用補中益氣去升麻柴胡加木瓜茯苓芍藥白朮治之而痊氣虛不潰少宗伯劉五清膁傷一塊微痛少食用六君子湯倍加當歸黃耆其痛漸止月餘瘀血內涸而不潰公以為痊余曰此陽氣虛極須調補不從至來春頭暈痰涎壅塞服清氣化痰病勢愈盛脈洪大而微細欲以參耆歸朮附子之類補之不信至秋初因怒昏憒而厥氣虛壅腫三條一婦人閃臂腕腫大已三月手臂日細肌瘦惡寒食少短氣脈息微細屬形病俱虛也遂投補中益氣加肉桂引諸藥以行至臂再加貝母香附以解久病之郁間服和血定痛丸以蔥尉之腫消二三因怒患處仍脹胸膈兩脅微痛以前湯更加木香山梔半夏桔梗服之少可復因驚不寐少食盜汗以歸脾湯加五味麥門二十餘劑而安腫消三四手臂漸肥但經水過期而少此心脾之血尚未充足而然也乃用八珍加五味麥門丹皮遠志香附貝母桔梗四十餘劑諸症悉愈後因怒發熱譫語經水如湧此怒動肝火以小柴胡湯加生地黃三錢一劑遂止以四物加柴胡調理而康州守陳克明子閃右臂腕腫痛肉色不變久服流氣等藥加寒熱少食舌乾作渴余曰傷損等症腫不消色不變此運氣虛而不能愈當助脾胃壯氣血為主遂從余法治之不二月形氣漸充腫熱漸消半載諸症悉退體如常一小兒閃腿腕壅腫形氣怯弱余欲治以補氣血為主佐以行散之劑不信乃內服流氣飲外敷寒涼藥加寒熱體倦余曰惡寒發熱脈息洪大氣血虛極也治之無功後內潰瀝盡氣血而亡瘀血腫痛一男子閃傷右腿壅腫作痛余謂急砭去滯血以補元氣庶無後患不信乃外敷大黃等藥內服流氣飲後湧出穢膿數碗許其膿不止乃復請治視其腿細而脈大作渴發熱辭不治後果歿窗友黃汝道環跳穴處閃傷瘀血腫痛發熱作渴遂砭去瘀血知其下焦素有虛火用八珍加黃柏知母牛膝骨碎補四劑頓止用十全大補湯少加黃柏知母麥門五味三十餘劑而斂筋傷壅腫李考功子十四歲腳腕閃傷腫而色夭日出清膿少許肝脈微澀此肝經受傷氣血虛而不能潰難治之症也急止克伐之劑不信乃雜用流氣等藥後果出爛筋而死肺火衄血張地官墜馬傷腿服草烏等藥致衄血咳嗽臂痛目黃口渴齒痛小便短少此因燥劑傷肺與大腸而致余用生地芩連黃柏知母山梔山藥甘草以潤肺之燥而生腎水小便頓長諸症並止以山藥五味麥門參耆芎歸黃柏黃芩知母炙草以滋陰血養元氣而瘡斂肝火出血三條俞進士折腿骨已接三月尚發熱出汗不止正體醫治不應左關脈洪數此肝火熾甚血得熱而妄行也遂投小柴胡湯加山梔芍藥生地防風血止熱退又用八珍五味麥門治之瘡口即愈田宗伯侄仲秋因怒跌僕遍身作痛發熱衄血肝脈洪弦余曰久衄脈弦洪乃肝火盛而制金也至春則肝木茂盛而自焚或戕賊脾土非易治之症當滋腎水以生肝木益脾土以生肺金乃雜用瀉肝火等藥歿於仲春之月一婦人因怒仆地傷面出血痰盛昏憒牙關緊急余曰此怒動肝火氣逆怫鬱神明昏冒而卒倒也兩手脈洪大而無倫次以小柴胡湯加黃連山梔芎歸橘紅茯苓薑汁治之而蘇胃火作嘔一膏粱之人跌腿青腫作痛服辛熱之藥反發熱作喘患處益痛口乾唇揭余曰膏粱之人內多積熱夏服辛熱之劑益其胃火而使然也頻飲童便以清胃散加山梔黃芩治之頓止患處以蔥尉之腫即消散陰虛作喘舉人杜克弘墜馬服下血藥反作喘日晡益甚此血虛所致耳非瘀血為患遂以四物加參耆五味麥門治之其喘頓止又用補中益氣加五味麥門而愈此症果系瘀血蒸熏於肺而喘只宜活血行血亦不可下若面黑胸脹或膈痛作喘當用人參一兩蘇木二兩作一劑水煎急服緩則不治産婦多有此疾陰虛發熱楊進士傷手指焮痛發熱服寒涼之藥致飲食頓減患處不潰余用托裡養血之藥食進瘡潰後因勞每日晡發熱此陰虛而內熱也以四物軟柴胡地骨皮乃退更用養血氣之藥而瘡斂氣血虛熱一男子墜馬腹有瘀血服藥下之致發熱盜汗自汗脈浮澀余以為重劑過傷氣血所致投以十全大補湯益甚時或譫語此藥力未及而然也以前藥加炮附子五分服之即睡覺來頓安再劑而痊血不歸經二條大尹劉國信金瘡出血發熱煩躁屬陰虛為患用聖愈湯治之虛火息而血歸經矣梁閣老侄金瘡腫痛出血不止寒熱口乾此氣虛血無所附而血不歸經也用補中益氣五味麥門主之陽氣復而愈氣無所附舉人余時正金瘡焮痛出血不止惡寒發熱用敗毒等藥愈甚亡血過多氣無所附而然耳遂以黃柏知母軟柴胡玄參五味麥門治之即愈氣血俱虛余北仕時有留都賈學士子年十六患流注已二載公升北宗伯邀余治診其脈洪大而數膿清作渴食少盜汗朝寒暮熱余曰此氣血俱虛也先以固氣血為主午前以四君芎歸炙草午後以四物參耆麥門五味兩月諸症遂可一二有一醫用滲和之藥保其必生治之三月氣血極虛而形體骨立復懇治余被命南下後果歿陽氣脫陷梁閣老侄跌傷腿外敷大黃等藥內服破血之劑遂致內潰余針出穢膿三碗許虛證悉具用大補之劑兩月餘少能步履因勞心手撒眼閉汗出如水或欲用祛風之劑余曰此氣血尚未充足而然也急以艾炒熱頻尉肚臍並氣海穴處以人參四兩炮附子五錢煎灌良久臂少動又灌一劑眼開能言但氣不能接續乃以參耆歸術四味共一斤附子五錢水煎徐徐服之而瘡愈膽經血少一女子年十七閃右臂微腫作痛寅申時發熱余決其膽經血虛火盛經水果先期而至先以四物合小柴胡湯四劑熱退更以加味四物湯加香附地骨皮山梔各五分芩連炙草各三分二十餘劑其腫亦消乃去黃連山梔又五十餘劑經水調而元氣充矣腎經虛怯二條儒者王清之跌腰作痛用定痛等藥不愈氣血日衰面目黧色余曰腰為腎之府雖曰閃傷實腎經虛弱所致遂用杜仲補骨脂五味山茱蓯蓉山藥空心服又以六君當歸白朮神麯各二錢食遠服不月而瘥一二三歲兒閃腰作痛服流氣等藥半載不愈余曰此稟腎氣不足不治之症也後果歿痛傷胃嘔一婦人傷指手臂俱腫微嘔少食彼以為毒氣內攻診其脈沉細此痛傷胃氣所致也遂刺出膿碗許先以六君藿香當歸而食進繼以八珍黃耆白芷桔梗月餘而瘡愈氣遏肉死二條一男子修傷足指色黑不痛而欲脫余曰此因陽氣虛不能運達於患處也急去之速服補劑以壯元氣否則死肉延足必不救矣不信果黑爛上脛而死大抵手足氣血罕到之地或生瘡或傷損若戕其元氣邪氣愈盛潰爛延上必死不潰而色黯者亦死若骨斷筋皮尚連者急剪去之一女年數歲嚴寒上京兩足受凍不仁用湯泡漬至春十指俱爛牽連末落余用托裡之劑助其陽氣自潰脫得保其生此因寒邪遏絶運氣不至又加熱湯泡漬故死而不痛也余嘗見人之嚴寒而出凍傷其耳目不知痛若以手觸之其耳即落當以暖暖處良久或熱手尉之無恙若以火烘湯泡其耳即死至春必潰脫落矣北方寒氣損人若此可不察之涼藥遏經云間曹於容為室人中風灌藥誤咬去指半節焮痛寒熱外敷大黃等藥內服清熱敗毒患處不痛不潰膿清寒熱愈甚余曰此因涼藥遏絶隧道而然也遂敷玉龍膏以散寒氣更服六君子湯以壯脾胃數日後患處微痛腫處漸消此陽氣運達患處也果出稠膿不數日半指潰脫更服托裡藥而斂上舍王天爵傷足焮腫內熱作渴內服外敷皆寒涼敗毒患處益腫而不潰且惡寒少食欲作嘔吐余曰此氣血俱虛又因寒藥凝結隧道損傷胃氣以致前症耳遂用香砂六君子芎歸炮姜外症悉退惟體倦晡熱飲食不甘以補中益氣湯加地骨皮五味麥門治之而愈州守王廷用傷指即用帛裹之瘀血內潰焮腫至手余謂宜解患處以出瘀血更用推陳致新之劑不信乃敷涼藥痛雖少止次日復作又敷之數日後手心背俱潰出瘀穢膿水尚服敗毒之劑氣血益虛色黯膿清飲食少思仍請余治投以壯脾胃生氣血之劑由是膿水漸稠而愈湯火所傷治驗火毒刑肺金一男子孟冬火傷臂作痛喘嗽發熱此火毒刑肺金之症用人參平肺散治之喘嗽乃止因勞又惡寒發熱此氣血虛也以八珍湯加桔梗白芷治之而退再加薄桂三分以助藥熱溫氣血壞肉潰之而愈若初起焮赤作痛用神效當歸膏敷之輕者自愈重者自腐生肌神效或用側柏葉末蠟油調敷亦效若發熱作渴小便赤色其脈洪數而實者用四物茯苓木通生甘草炒黃連脈雖洪數而虛者用八珍若患處不潰而色黯者四君芎歸黃耆之類若肉死已潰而不生肌者用四君黃耆當歸炮姜若愈後而惡寒陽氣未復也急用十全大補切不可用寒涼反傷脾胃火毒焮作一男子因醉被湯傷腿潰爛發熱作渴飲水脈洪數而有力此火毒為患用生地當歸芩連木通葛根甘草十餘劑諸症漸退卻用參耆白朮芎歸炙草芍藥白芷木瓜新肉將完因勞忽寒熱此氣血虛而然也仍用參耆之藥加五味子酸棗仁而安又月餘而瘡痊火毒行於下焦一男子火傷兩臂焮痛大小便不利此火毒傳於下焦用生地黃當歸芍藥黃連木通山梔赤茯苓甘草一劑二便清利其痛亦止乃以四物參耆白芷甘草而壞肉去又數劑而新肉生火毒乘血分一婦人湯傷胸大潰兩月不斂脈洪大而無力口乾發熱日晡益甚此陰血虛火毒乘之而為患耳用四物湯加柴胡丹皮熱退身涼更用逍遙散加陳皮以養陰血壯脾胃腐肉去而新肉生
