body:
  text: 下卷方藥四君子湯治脾胃虛弱或因克伐腫痛不散或潰而不斂或飲食少思或欲作嘔大便不實等症人參白朮茯苓各二錢甘草炙一錢上作一劑薑棗水煎服小柴胡湯治一切撲傷等症因肝膽經火盛作痛出血自汗寒熱往來日晡發熱或潮熱身熱咳嗽發熱脅下作痛兩胠痞滿柴胡二錢黃芩一錢五分半夏一錢人參一錢甘草炙三分上薑水煎服神效蔥尉法治跌撲傷損用蔥白細切杵爛炒熱敷患處如冷易之腫痛即止其效如神八珍湯治傷損等症失血過多或因克伐血氣耗損惡寒發熱煩躁作渴等症人參白朮白茯苓當歸川芎白芍藥熟地黃各一錢甘草炙五分上薑棗水煎服犀角地黃湯治火盛血熱妄行或吐衄不止大便下血如因怒而致加山梔柴胡犀角鎊末生地黃白芍藥黃芩牡丹皮黃連各一錢五分用水煎熟傾於盅內入犀末服之十味參蘇散治氣逆血蘊上焦發熱氣促或咳血衄血或痰嗽不止加黃芩山梔即加味參蘇飲人參紫蘇半夏茯苓陳皮桔梗前胡葛根枳殼各一錢甘草炙五分上用薑水煎服二味蘇參飲治出血過多瘀血入肺面黑喘促人參一兩蘇木二兩用水煎服四物湯治一切血虛日晡發熱煩躁不安者皆宜服之當歸熟地黃各三錢芍藥二錢川芎一錢五分上水煎服加白朮茯苓柴胡丹皮即加味四物湯桃仁承氣湯加當歸即歸承湯治傷損血滯於內作痛或發熱發狂等症桃仁芒硝甘草各一錢大黃二錢用水煎服大黃更量虛實加味承氣湯治瘀血內停胸腹脹痛或大便不通等症大黃朴硝各二錢枳實一錢厚朴一錢甘草五分當歸紅花各一錢用酒水各一鍾煎一鍾服仍量虛實加減病急不用甘草獨參湯治一切失血與瘡瘍潰後氣血俱虛惡寒發熱作渴煩躁者宜用此藥補氣蓋血生於氣陽生陰長之理也用人參二兩棗十枚水煎服歸脾湯治跌撲等症氣血損傷或思慮傷脾血虛火動寤而不寐或心脾作痛怠惰嗜臥怔忡驚悸自汗盜汗大便不調或血上下妄行其功甚捷白朮當歸白茯苓黃耆炒龍眼肉遠志酸棗仁炒各一錢木香五分甘草炙三分人參一錢上薑棗水煎服加柴胡山梔即加味歸脾湯潤腸丸治跌撲等症或脾胃伏火大腸乾燥或風熱血結等症麻子仁一兩桃仁一兩去皮尖羌活當歸尾大黃煨皂角刺秦艽各五錢上為末煉蜜丸桐子大豬膽汁丸尤妙每服三五十丸食前白滾湯送下凡怯弱人先用豬膽導之不通宜補氣血當歸補血湯治杖瘡金瘡等症血氣損傷肌熱大渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無此病多得於飢渴勞役者若誤用白虎湯必死黃耆炙一兩當歸二錢酒製用水煎服聖愈湯治杖瘡金瘡癰疽膿血出多熱躁不安或晡熱作渴等症熟地黃酒洗生地黃酒洗人參各一錢川芎一錢當歸酒洗黃芩各五分用水煎服十全大補湯治杖瘡氣血俱虛腫痛不消腐而不潰潰而不斂或惡寒發熱自汗盜汗飲食少思肢體倦怠若怯弱之人患處青腫而肉不壞者服之自愈若有瘀血砭刺早者服之自消或潰而膿水清稀肌肉不生或口乾作渴而飲湯者尤宜服之白茯苓人參當歸白朮黃耆川芎白芍藥炒熟地黃生者自制肉桂五分甘草炙各一錢用薑棗水煎服參附湯治金瘡杖瘡失血過多或膿瘀大泄陽隨陰走上氣喘急自汗盜汗氣短頭暈等症人參四錢附子炮去皮臍三錢用水煎服陽氣脫陷者倍用之清胃散治血傷火盛或胃經濕熱唇口腫痛牙齦潰爛或發熱惡寒等症生地黃五分升麻一錢牡丹皮五分當歸酒洗五分黃連五分用水煎服如痛未止黃芩石膏大黃之類皆可量加清燥湯治跌撲瘡瘍血氣損傷或潰後氣血虛怯濕熱乘之遍身痠軟或秋夏濕熱太甚肺金受傷絶寒水生化之源腎無所養小便赤澀大便不調或腰腿痿軟口乾作渴體重麻木或頭目暈眩飲食少思或自汗體倦胸滿氣促或氣高而喘身熱而煩黃耆一錢五分蒼朮一錢白朮陳皮澤瀉各五分五味子九粒白茯苓人參升麻各五分麥門冬當歸身生地黃神麯炒豬苓酒柏各五分柴胡黃連甘草炙各三分上薑水煎服濕痰壅盛參耆歸地之類可暫減之生脈散治金瘡杖瘡等症發熱體倦氣短或汗多作渴或潰後睡臥不寧陽氣下陷發熱煩躁若六七月間濕熱大行火土合病令人脾胃虛弱身重氣短或金為火制絶寒水化源肢體痿軟腳欹眼黑並宜服人參五錢五味子一錢麥門冬一錢用水煎服二妙丸治下焦濕熱腫痛或流注遊走遍身疼痛蒼朮黃柏各等分用為末每服二三錢酒調服作丸亦可四斤丸治肝腎精血不足筋無所養攣縮不能步履或邪淫於內筋骨痿軟肉蓯蓉酒浸牛膝酒洗天麻乾木瓜鹿茸炙熟地黃生者自制菟絲子酒浸煮杵五味子各等分上為末用地黃膏丸桐子大每服五七十丸空心溫酒送下補中益氣湯治跌撲等症損傷元氣或過服克伐惡寒發熱肢體倦怠血氣虛弱不能生肌收斂或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱自汗倦怠飲食少思黃耆炙人參白朮甘草炙各一錢五分當歸一錢陳皮五分柴胡升麻各三分用薑棗水煎服四生散治腎臟風毒遍身瘙癢或膿水淋漓耳鳴目癢或鼻赤齒浮口舌生瘡婦人血風瘡更效白附子獨活黃耆蒺藜各等分上為末各等分每服二錢用腰子一枚劈開入藥濕紙包裹煨熟細嚼鹽湯下酒服亦可竹葉黃耆湯治氣血虛胃火盛而作渴者淡竹葉二錢黃耆生地黃當歸麥門冬川芎甘草黃芩炒芍藥人參石膏煅各一錢用水煎服竹葉石膏湯治胃火盛而作渴者淡竹葉石膏煅桔梗木通薄荷甘草各一錢用薑水煎服人參平肺飲治心火克肺咳嗽喘嘔痰涎壅盛咽喉不利等症人參陳皮甘草各一錢地骨皮茯苓知母各八分五味子青皮天門冬桑白皮各五分上水煎服滋腎丸治腎經陰虛發熱作渴足熱腿膝無力等症凡不渴而小便閉者最宜用之肉桂三錢知母酒炒黃柏酒炒各二兩上為末水丸桐子大每服七八十丸空心白滾湯下六味地黃丸加肉桂五味各一兩名加減八味丸治傷損之症因腎肺二經虛弱發熱作渴頭暈眼花咽燥唇裂齒不堅固腰腿痿軟小便頻赤自汗盜汗便血諸血失喑水泛為痰之聖藥血虛發熱之神劑若損重傷骨不能言如喑者用此水煎服之亦效熟地黃八兩杵膏自制山茱萸肉乾山藥各四兩牡丹皮白茯苓澤瀉各三兩上為末和地黃丸桐子大每服七八十丸空心食前滾湯下清心蓮子飲治發熱口渴白濁夜安靜而晝發熱等症黃芩一錢麥門冬地骨皮車前子炒甘草各一錢五分石蓮肉茯苓黃耆炒柴胡人參各一錢上水煎服七味白朮散治脾胃虛弱津液短少口渴作渴或中風虛熱口舌生瘡不喜飲冷最宜服之人參白朮木香白茯苓甘草炙藿香各五分乾葛一錢用水煎服黑丸子一名和血定痛丸治跌撲墜墮筋骨疼痛或瘀血壅腫或風寒肢體作痛若流注膝風初結服之自消若潰而膿清發熱與補氣血藥兼服自斂百草霜白芍藥各一兩赤小豆一兩六錢川烏炮三錢白蘞一兩六錢白芨當歸各八錢南星泡三錢牛膝焙六錢骨碎補焙六錢上各另為末酒糊丸桐子大每服三十丸鹽湯溫酒送下孕婦勿服白丸子治一切風痰壅盛手足頑麻或牙關緊急口眼歪斜半身不遂等症半夏七兩生用南星二兩生用川烏去皮臍生用五錢上為末用生薑汁調糊丸桐子大每服一二十丸薑湯送下六君子湯治金瘡杖瘡等症因元氣虛弱腫痛不消或不潰斂或服克伐傷脾或不思飲食宜服之以壯營氣此方即四君子湯加陳皮白朮更加香附藿香砂仁香砂六君子回陽玉龍膏治跌撲所傷為敷涼藥或人元氣虛寒腫不消散或不潰斂及癰腫堅硬肉色不變久而不潰潰而不斂或筋攣骨痛一切冷症並效草烏二錢南星一兩煅軍薑炒一兩白芷一兩赤芍藥一兩炒肉桂五錢用為末蔥湯調塗熱酒亦可復原活血湯治跌撲等症瘀血停凝脅腹作痛甚者大便不通柴胡當歸紅花各二錢穿山甲炮五分大黃酒炒一錢桃仁二十枚甘草五分栝蔞根一錢用酒水各半煎服復原通氣散治打撲傷損作痛及乳癰便毒初起或氣滯作痛木香茴香炒青皮去白穿山甲酥炙陳皮白芷甘草漏蘆貝母各等分上為末每服一二錢溫酒調下愚按前方治打撲閃錯或惱怒氣滯血凝作痛之良劑經云形傷作痛氣傷作腫又云先腫而後痛者形傷氣也先痛而後腫者氣傷形也若人元氣素弱或因叫號血氣損傷或過服克伐之劑或外敷寒涼之藥血氣凝結者當審前大法用溫補氣血為善神效太乙膏治癰疽發背杖瘡及一切瘡疽潰爛玄參白芷當歸肉桂赤芍藥大黃生地黃各一兩用麻油二斤入銅鍋內煎至藥黑濾去渣徐入淨黃丹十二兩再煎滴水中捻軟硬得中即成膏矣乳香定痛散治杖瘡金瘡及一切瘡瘍潰爛疼痛乳香沒藥各五錢滑石一兩寒水石一兩煅冰片一錢上為末搽患處痛即止甚效豬蹄湯治一切癰疽杖瘡潰爛消腫毒去惡肉白芷當歸羌活赤芍藥露蜂房蜂兒多者佳生甘草各五錢用豬蹄一隻水五碗煮熟取清湯入前藥煎數沸去渣溫洗隨用膏藥貼之神效當歸膏治杖撲湯火瘡毒不問已潰未潰肉雖傷而未壞者用之自愈肉已死而用之自潰新肉易生搽至肉色漸白其毒始盡生肌最速如棍杖者外皮不破肉內糜爛其外皮因內焮干縮堅硬不潰爬連好肉作痛故俗云丁痂皮致膿瘀無從而泄內愈脹痛腐潰益深往往不待其潰就行割去而瘡口開張難以潰斂怯弱之人多成破傷風症每致不救若杖瘡內有瘀血者即用有鋒芒瓷片於患處砭去塗以此藥則丁痂自結死肉自潰膿穢自出所潰亦淺生肌之際亦不結痂又免皴揭之痛殊有神效蓋當歸地黃麻油二蠟主生肌止痛補血續筋與新肉相宜此方余以刊行治者亦多用之當歸一兩麻油六兩黃蠟一兩生地黃一兩上先將當歸地黃入油煎黑去粗入蠟溶化候冷攪勻即成膏矣白蠟尤效托裡散治金瘡杖瘡及一切瘡毒因氣血虛不能成膿或膿成不能潰斂膿水清稀久而不瘥人參一錢氣虛多用之黃耆鹽水拌炒一兩白朮炒陳皮各七分當歸身酒拌一錢芍藥酒炒熟地黃生者自制白茯苓各一錢用水煎服加味芎歸湯治跌撲墜墮皮膚不破瘀血入胃作嘔芎藭當歸百合水浸半日白芍藥荊芥穗各二錢用酒水煎服當歸導滯散治跌撲瘀血在內胸腹脹滿或大便不通或喘咳吐血大黃當歸各等分用為末每服三錢溫酒下氣虛須加桂花蕊石散治打撲傷損腹中瘀血脹痛欲死服之血化為水其功不能盡述硫黃明色者四兩花蕊石一兩上為末和勻先用紙筋和鹽泥固濟瓦罐一個候乾入藥再用泥封口安在磚上虛書八卦五行用炭三十斤煅之罐冷取出每服一錢童便調下愚按前方若被傷熾盛元氣虧損內有瘀血不勝疏導者用前藥一服其血內化又不動臟腑甚妙甚妙經驗方治跌撲瘀血作痛或筋骨疼痛黃柏一兩半夏五錢上為末用薑汁調塗患處以紙貼之如乾薑汁潤之周日易之消毒定痛散治跌撲腫痛無名異炒木耳炒大黃炒各五分上為末蜜水調塗如內有瘀血砭去敷之若腐處更用當歸膏敷之尤妙藥蛆方治杖瘡潰爛生蛆用皂礬煅過為末乾摻其內蛆即死如未應佐以柴胡梔子散以清肝火洗藥凡傷重者用此淋洗然後敷藥荊芥土當歸生蔥切斷一方用生薑上煎湯溫洗或止用蔥一味煎洗亦可黑龍散治跌撲傷損筋骨碎斷先用前湯淋洗以紙攤貼若骨折更以薄木片夾貼以小繩束三日再如前法勿去夾板恐搖動患處至骨堅牢方宜去若被刀剪蟲傷成瘡並用薑汁和水調貼口以風流散填塗土當歸二兩丁香皮六兩百草霜散血入六兩穿山甲六兩炒黃或煉存性枇杷葉去毛入半兩一雲山枇杷根上焙為細末薑汁水調或研地黃汁調亦好洪寶丹一名濟陰丹治傷損焮痛並接斷天花粉三兩薑黃白芷赤芍藥各一兩上為末茶湯調搽患處治金傷出血不止用牛膽石灰摻之即止以臘月牛膽入風化石灰懸當風候乾用又方金瘡出血不止以五倍子生為末干貼如不止屬血熱宜用犀角地黃湯之類大凡金瘡出血不止若素怯弱者當補氣若素有熱當補血若因怒氣當平肝若煩熱作渴昏憒當補脾氣若筋攣搐搦當養肝血不應用地黃丸以滋腎水又方皮破筋斷者以百膠香塗之或以金沸草汁頻塗自然相續沒藥降聖丹治傷損筋骨疼痛或不能屈伸肩背拘急身體倦怠四肢無力沒藥別研當歸酒洗炒白芍藥骨碎補撏去毛川烏去毛臍泡川芎各一兩半自然銅火煅醋淬十二次研為末水飛過焙一兩上為細末每一兩作四丸以生薑自然汁與煉蜜為丸每服一丸捶碎用水酒各半鍾入蘇木少許煎至八分去蘇木空心服愚按脾主肉肝主筋若因肝脾二經氣血虛弱或血虛有熱而不愈者當求其本而治之萬金膏治癰疽及墜撲傷損或筋骨疼痛龍骨鱉甲苦參烏賊魚骨黃柏黃芩黃連白芨白蘞豬牙皂角厚朴草烏川芎當歸木鱉子仁白芷各一兩沒藥另研乳香另研各半兩槐枝柳枝各四寸長二十一條黃丹一斤半炒過淨清油四斤上除乳沒黃丹外諸藥入油內煎至黑色去之稱淨油每斤入丹半斤不住手攪令黑色滴水中不黏手下乳沒再攪如硬入油些少以不黏手為度接骨散治骨折碎或骨出𩨽先整端正卻服此藥如飛禽六畜所傷亦能治硼砂一錢五分水粉當歸各一錢上為末每服二錢煎蘇木湯調服後但飲蘇木湯立效本事接骨方治打折傷損接骨木半兩即蒴藋也乳香半兩赤芍藥當歸川芎自然銅各一兩上為末用黃蠟四兩溶入前末攪勻衆手丸龍眼大如打傷筋骨及閃痛不堪忍者用一丸熱酒浸開熱呷痛便止若大段傷損先整骨用川烏草烏等分為末生薑汁調貼之挾定服藥無不效者愚按前三方俱效者備録之以便修用沒藥丸治打撲筋骨疼痛或血逆血暈或瘀血內停肚腹作痛或胸膈脹悶沒藥乳香川芎川椒芍藥當歸桃仁血竭各一兩自然銅四錢火煅七次上為末用黃蠟四兩溶化入前末速攪勻丸彈子大每服一丸酒化服愚按接骨散沒藥丸元氣無虧者宜用若腎氣素怯或高年腎氣虛弱者必用地黃丸補中益氣湯以固其本為善羌活防風湯治破傷風邪初在表者急服此藥以解之稍遲則邪入於裡與藥不相合矣羌活防風甘草川芎藁本當歸芍藥各四兩地榆細辛各二兩上每服五錢水煎防風湯治破傷風表症未傳入里急宜服之防風羌活獨活川芎各等分上每服五錢水煎調蜈蚣散服大效蜈蚣散蜈蚣一對鰾三錢上為細末用防風湯調下羌活湯治破傷風在半表半裡急用此湯稍緩邪入於裡不宜用羌活菊花麻黃川芎石膏防風前胡黃芩細辛甘草白茯苓枳殼蔓荊子各一兩薄荷白芷各五錢上每服五錢水煎地榆防風散治風在半表半裡頭微汗身無汗不可發汗兼治表裡地榆防風地丁草馬齒莧各等分上為細末每服三錢米湯調服大芎黃湯治風在裡宜疏導急服此湯川芎羌活黃芩大黃各一兩上五七錢水煎溫服臟腑通利為度白朮防風湯治服表藥過多自汗者白朮黃耆各一兩防風二兩上每服五七錢水煎服臟腑和而自汗者可服若臟腑祕小便赤者宜用大芎黃湯下之白朮湯治破傷風汗不止筋攣搐搦白朮葛根升麻黃芩芍藥各二兩甘草二錢五分上每服五錢水煎無時服謙甫硃砂丸治破傷風目瞪口噤不語手足搐搦項筋強直不能轉側目不識人硃砂研半夏洗川烏各一兩雄黃五錢鳳凰臺三錢麝香一字上為末棗肉丸桐子大每服一丸或二丸冷水下以吐為度如不吐加一丸或吐不住煎蔥白湯止之汗出為效左龍丸治直視在裡者左盤龍野鴿糞白殭蠶鰾炒各五錢雄黃一錢上為末燒飯丸桐子大每服十五丸溫酒下如里症不已當用前藥末一半加巴豆霜半錢燒飯丸桐子大每服加入一丸如此漸加以利為度利後服和解藥江鰾丸治破傷風傳入里症驚而發搐臟腑祕澀江鰾銼炒半兩野鴿糞炒半兩雄黃一錢白殭蠶半兩蜈蚣一對天麻一兩上為末作三分二分燒飯丸桐子大硃砂為衣一分入巴豆霜一錢亦用燒飯丸每服硃砂者二十丸入巴豆者一丸漸加至利為度後止服前丸養血當歸地黃湯當歸地黃芍藥川芎藁本防風白芷各一兩細辛五錢上依前煎服廣利方治破傷風發熱栝蔞子九錢滑石三錢半南星蒼朮赤芍藥陳皮炒柏黃連黃芩白芷甘草各五分用薑水煎服上二方用竹瀝栝蔞實輩治破傷風熱痰脈洪者前方用南星半夏草烏川烏輩則治破傷風寒痰脈無力者白丸子治一切風痰壅盛手足頑麻或牙關緊急口眼歪斜半身不遂等症半夏七兩生用南星二兩生用川烏去皮臍生用五錢上為末用生薑汁調糊丸桐子大每服一二十丸薑湯下本事玉真散治破傷風及打撲損傷項強口噤欲死南星有防風制其毒不麻人天南星湯泡七次防風等分上為末先以熱童子小便洗淨瘡口拭乾摻之良久渾身作癢瘡口出赤水是效又以溫酒調下一錢如牙關緊急腰背反張用藥二錢童子小便調服至死心頭微溫者急灌之亦可救纍效纍驗治打撲傷損腫痛傷風者天南星半夏地龍各等分上為末用生薑薄荷汁調搽患處
