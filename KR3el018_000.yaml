front:
  text: 序世恆言醫有十三科科自專門各守師説少能相通者其大較然也然諸科方論作者相繼纂輯不遺而正體科獨無其書豈非接復之功妙在手法而按揣之勞率鄙為粗工而莫之講歟昔我毅皇帝因馬逸傷諸尚藥以非世業莫能治獨吾蘇徐通政鎮侍藥奏效聖體如初而徐亦由此遭際擢官至九列子孫世以其術仕醫垣此其所繫豈小小者而可以弗講也且肢體損於外則氣血傷於內榮衛有所不貫臟腑由之不和豈可純任手法而不求之脈理審其虛實以施補瀉哉太史公有言人之所病病疾多醫之所病病道少吾以為患在不能貫而通之耳秦越人過琅琊即為帶下醫過洛陽即為耳目痹醫入咸陽即為小兒醫此雖隨俗為變豈非其道固無所不貫哉立齋薛先生以癰疽承家而諸科無所不治嘗病正體家言獨有未備間取諸身所治驗總而集之為正體類要若干卷極變析微可謂詳且盡矣而處方立論決生定死固不出諸科之外也然則學者又豈病道之少乎先生嘗著外科樞要余既為之序以刻矣將復刻是書備一家言余仰其用心之勤乃復為綴數語卷首使後世知先生之術固無所不通而未嘗不出於一也學者其勿以專門自諉哉先生名己字新甫官位出處詳外科樞要序中茲不更列前進士禮部主事陸師道著
